name: Build and Publish Docker Images

on:
  push:
    branches: [main, 1.3.x]
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  pull_request:
    branches: [main, 1.3.x]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: sunfounder/pironman5

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: base
            pipower5: "false"
            suffix: ""
          - variant: mini
            pipower5: "false"
            suffix: ""
          - variant: max
            pipower5: "false"
            suffix: ""
          - variant: pro-max
            pipower5: "false"
            suffix: ""
          - variant: base
            pipower5: "true"
            suffix: "-pipower5"

    steps:
      - name: Checkout pironman5
        uses: actions/checkout@v4
        with:
          path: pironman5

      - name: Checkout installer-scripts
        uses: actions/checkout@v4
        with:
          repository: sunfounder/sunfounder-installer-scripts
          ref: main
          path: installer-scripts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.variant }}${{ matrix.suffix }}
            type=ref,event=tag,prefix=${{ matrix.variant }}${{ matrix.suffix }}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: installer-scripts
          file: installer-scripts/docker/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VARIANT=${{ matrix.variant }}
            PIPOWER5=${{ matrix.pipower5 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
